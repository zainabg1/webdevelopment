<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Iconen (Boxicons) -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- Basis styling + contactpagina styling -->
    <link rel="stylesheet" href="../CSS/base.css">
    <link rel="stylesheet" href="../CSS/contact.css">

    <title>Contactpagina</title>
</head>

<body>

    <!-- Header + navigatie -->
    <header class="header">
        <a href="home.html" class="logo">Zainab Guman</a>
        <i class='bx bx-menu' id="menu-icon"></i>

        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="overmij.html">Over mij</a>
            <a href="projecten.html">Projecten</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <!-- Contactsectie -->
    <section class="contact" id="contact">
        <h2 class="heading">Contacteer <span>Mij</span></h2>

        <!-- Contactformulier -->
        <form action="#">
            <!-- Eerste rij: naam + email -->
            <div class="input-inbox">
                <input type="text" placeholder="Volledige Naam">
                <input type="email" name="Email" placeholder="Emailadres">
            </div>

            <!-- Tweede rij: telefoon + onderwerp -->
            <div class="input-box">
                <input type="tel" placeholder="Telefoonnummer">
                <input type="text" placeholder="Email Onderwerp">
            </div>

            <!-- Berichtveld -->
            <textarea name="message" cols="30" rows="10" placeholder="Jouw Bericht"></textarea>

            <!-- Verstuurknop -->
            <input type="submit" value="Stuur Bericht" class="btn">
        </form>
    </section>

    <!-- Footer met social links -->
    <footer class="footer">
        <div class="social">
            <a href="https://www.linkedin.com/in/zainab-guman-b64562355/"><i class='bx bxl-linkedin-square'></i></a>
            <a href="https://gitlabsrv05.stichtingpraktijkleren.nl/zainab.guman"><i class='bx bxl-gitlab'></i></a>
            <a href="https://github.com/zainabg1"><i class='bx bxl-github'></i></a>
        </div>

        <p class="copyright">
            &copy; Zainab Guman - All Rights Reserved
        </p>
    </footer>
</body>
</html>
